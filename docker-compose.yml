# Context Studio — full stack.
#   docker compose up --build
#   → web  on http://localhost:3000
#   → API  on http://localhost:4000
#
# All server state (SQLite DB, the on-disk context repo, published bundles,
# signing keys) lives on the `cs-data` volume so it survives restarts.

services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      DATABASE_URL: "file:/data/dev.db"
      CONTEXT_REPO_DIR: "/data/.context-repo"
      CONTEXT_DIST_DIR: "/data/.dist"
      CONTEXT_SIGNING_DIR: "/data/.signing"
      # SEED: "0"   # uncomment to skip first-boot demo seeding
      # CONTEXT_WEBHOOK_URL: "https://hooks.slack.com/services/…"  # event notifications (Slack or any endpoint)
    volumes:
      - cs-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Browser-facing API URL (inlined at build). Change if you publish the
        # server on a different host/port.
        NEXT_PUBLIC_API_BASE: "http://localhost:4000"
    ports:
      - "3000:3000"
    environment:
      # SSR (inside the web container) reaches the server over the compose network.
      API_INTERNAL_BASE: "http://server:4000"
    depends_on:
      server:
        condition: service_started

volumes:
  cs-data:
